<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0f1a;
      --surface: #111827;
      --surface-hover: #1e293b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --accent: #3b82f6;
      --accent-glow: #3b82f6;
      --border: #1e3a5f;
      --shadow: 8px 8px 16px #070b14, -8px -8px 16px #131f33;
      --shadow-sm: 4px 4px 8px #070b14, -4px -4px 8px #131f33;
      --shadow-inset: inset 4px 4px 8px #070b14, inset -4px -4px 8px #131f33;
      --icon-filter: brightness(0) invert(0.8);
    }

    [data-theme="light"],
    .light-theme {
      --bg: #e8edf5;
      --surface: #e0e5ee;
      --surface-hover: #d1d9e6;
      --text: #1e293b;
      --text-muted: #475569;
      --text-dim: #64748b;
      --accent: #3b82f6;
      --border: #c0c8d4;
      --shadow: 8px 8px 16px #c4cddb, -8px -8px 16px #ffffff;
      --shadow-sm: 4px 4px 8px #c4cddb, -4px -4px 8px #ffffff;
      --shadow-inset: inset 4px 4px 8px #c4cddb, inset -4px -4px 8px #ffffff;
      --icon-filter: brightness(0) invert(0.2);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .clock {
      font-size: 4rem;
      font-weight: 600;
      letter-spacing: -2px;
      margin-bottom: 8px;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
      transition: color 0.3s ease;
    }

    .date {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
      transition: color 0.3s ease;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      width: 100%;
      max-width: 520px;
      margin-bottom: 40px;
      box-shadow: var(--shadow-inset);
      transition: all 0.3s ease;
    }

    .search-box:focus-within {
      box-shadow: var(--shadow-inset), 0 0 0 2px rgba(59, 130, 246, 0.3);
    }

    .search-box i {
      color: var(--text-muted);
      font-size: 14px;
      transition: color 0.3s ease;
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: color 0.3s ease;
    }

    .search-box input::placeholder {
      color: var(--text-dim);
    }

    .search-box select {
      background: var(--surface);
      border: none;
      border-radius: 10px;
      color: var(--text-muted);
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
    }

    .search-box select:hover {
      box-shadow: var(--shadow);
    }

    .shortcuts {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      max-width: 520px;
      width: 100%;
    }

    .shortcut {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      cursor: pointer;
      position: relative;
    }

    .shortcut-icon {
      width: 56px;
      height: 56px;
      background: var(--surface);
      border: none;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
      position: relative;
    }

    .shortcut:hover .shortcut-icon {
      box-shadow: var(--shadow);
      transform: translateY(-3px);
    }

    .shortcut:active .shortcut-icon {
      box-shadow: var(--shadow-inset);
      transform: translateY(0);
    }

    .shortcut-icon img {
      width: 24px;
      height: 24px;
      filter: var(--icon-filter);
      transition: filter 0.3s ease;
    }

    .shortcut-icon i {
      font-size: 22px;
      color: var(--text-muted);
      transition: color 0.3s ease;
    }

    .shortcut-label {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      max-width: 64px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color 0.3s ease;
    }

    .shortcut:hover .shortcut-label {
      color: var(--text);
    }

    .delete-shortcut {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 20px;
      height: 20px;
      background: var(--surface);
      border: none;
      border-radius: 50%;
      color: var(--text-muted);
      font-size: 10px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
      z-index: 10;
    }

    .shortcut:hover .delete-shortcut {
      display: flex;
    }

    .delete-shortcut:hover {
      color: #ef4444;
      box-shadow: var(--shadow);
      transform: scale(1.1);
    }

    .quote {
      position: fixed;
      bottom: 24px;
      font-size: 13px;
      color: var(--text-dim);
      max-width: 400px;
      text-align: center;
      transition: color 0.3s ease;
    }

    .loader {
      position: fixed;
      inset: 0;
      background: rgba(10, 15, 26, 0.9);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .loader.show {
      display: flex;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 200;
    }

    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: var(--surface);
      padding: 24px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      width: 90%;
      max-width: 320px;
      text-align: center;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.show .modal-content {
      transform: translateY(0);
    }

    .modal-content p {
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--text);
    }

    .modal-content input {
      width: 100%;
      background: var(--bg);
      border: none;
      padding: 12px;
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      margin-bottom: 20px;
      box-shadow: var(--shadow-inset);
      outline: none;
    }

    .modal-content input:focus {
      box-shadow: var(--shadow-inset), 0 0 0 2px rgba(59, 130, 246, 0.3);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .modal-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      background: var(--surface);
      color: var(--text);
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
      flex: 1;
    }

    .modal-btn:hover {
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .modal-btn:active {
      box-shadow: var(--shadow-inset);
      transform: translateY(0);
    }

    .modal-btn.primary {
      color: var(--accent);
    }

    .modal-btn.danger {
      color: #ef4444;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    * {
      transition: background-color 0.3s ease, 
                  border-color 0.3s ease, 
                  box-shadow 0.3s ease,
                  color 0.3s ease;
    }
  </style>
</head>

<body>
  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="clock" id="clock">00:00</div>
  <div class="date" id="date"></div>

  <form class="search-box" id="searchForm">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="Search the web..." autocomplete="off">
    <select id="engine">
      <option value="https://search.brave.com/search?q=">Brave</option>
      <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
      <option value="https://www.google.com/search?q=">Google</option>
    </select>
  </form>

  <div class="shortcuts" id="shortcuts">
    <div class="shortcut" id="addShortcut">
      <div class="shortcut-icon"><i class="fa-solid fa-plus"></i></div>
      <span class="shortcut-label">Add</span>
    </div>
  </div>

  <div class="quote" id="quote"></div>

  <div class="modal-overlay" id="confirmModal">
    <div class="modal-content">
      <p id="confirmText"></p>
      <div class="modal-actions">
        <button class="modal-btn" id="confirmNo">Cancel</button>
        <button class="modal-btn danger" id="confirmYes">Delete</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="promptModal">
    <div class="modal-content">
      <p id="promptText"></p>
      <input type="text" id="promptInput" autocomplete="off">
      <div class="modal-actions">
        <button class="modal-btn" id="promptCancel">Cancel</button>
        <button class="modal-btn primary" id="promptSubmit">Submit</button>
      </div>
    </div>
  </div>

  <script>
    // --- Theme Management ---
    function applyTheme() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
        document.body.classList.add('light-theme');
        document.body.setAttribute('data-theme', 'light');
      } else {
        document.body.classList.remove('light-theme');
        document.body.setAttribute('data-theme', 'dark');
      }
    }
    applyTheme();

    window.addEventListener('message', (event) => {
      if (event.data.type === 'themeChange') {
        localStorage.setItem('theme', event.data.theme);
        applyTheme();
      }
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (!localStorage.getItem('theme')) applyTheme();
    });

    // --- Utilities ---
    const $ = s => document.querySelector(s);
    const nav = url => {
      $('#loader').classList.add('show');
      window.parent?.postMessage({ type: 'navigate', url }, '*');
    };

    // --- Clock ---
    function updateClock() {
      const now = new Date();
      $('#clock').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      $('#date').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // --- Search ---
    $('#searchForm').onsubmit = e => {
      e.preventDefault();
      const q = $('#searchInput').value.trim();
      if (q) nav($('#engine').value + encodeURIComponent(q));
    };

    // --- Custom Modal Logic (Promises) ---
    function customConfirm(message) {
      return new Promise((resolve) => {
        const modal = $('#confirmModal');
        $('#confirmText').textContent = message;
        modal.classList.add('show');

        const close = (result) => {
          modal.classList.remove('show');
          $('#confirmYes').onclick = null;
          $('#confirmNo').onclick = null;
          resolve(result);
        };

        $('#confirmYes').onclick = () => close(true);
        $('#confirmNo').onclick = () => close(false);
      });
    }

    function customPrompt(message, placeholder = "") {
      return new Promise((resolve) => {
        const modal = $('#promptModal');
        const input = $('#promptInput');
        $('#promptText').textContent = message;
        input.value = "";
        input.placeholder = placeholder;
        modal.classList.add('show');
        input.focus();

        const close = (result) => {
          modal.classList.remove('show');
          $('#promptSubmit').onclick = null;
          $('#promptCancel').onclick = null;
          input.onkeydown = null;
          resolve(result);
        };

        $('#promptSubmit').onclick = () => close(input.value.trim() ? input.value.trim() : null);
        $('#promptCancel').onclick = () => close(null);
        
        // Allow pressing Enter to submit
        input.onkeydown = (e) => {
          if (e.key === 'Enter') close(input.value.trim() ? input.value.trim() : null);
          if (e.key === 'Escape') close(null);
        };
      });
    }

    // --- Shortcut Management ---
    const defaultShortcuts = [
      { name: "YouTube", url: "https://youtube.com", iconHtml: '<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" alt="YouTube">' },
      { name: "GitHub", url: "https://github.com", iconHtml: '<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg" alt="GitHub">' },
      { name: "Discord", url: "https://discord.com", iconHtml: '<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/discord.svg" alt="Discord">' },
      { name: "Twitter", url: "https://twitter.com", iconHtml: '<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg" alt="Twitter/X">' },
      { name: "Reddit", url: "https://reddit.com", iconHtml: '<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/reddit.svg" alt="Reddit">' },
      { name: "Spotify", url: "https://spotify.com", iconHtml: '<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg" alt="Spotify">' },
      { name: "Netflix", url: "https://netflix.com", iconHtml: '<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/netflix.svg" alt="Netflix">' },
      { name: "Twitch", url: "https://twitch.tv", iconHtml: '<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/twitch.svg" alt="Twitch">' },
      { name: "Gmail", url: "https://mail.google.com", iconHtml: '<img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/gmail.svg" alt="Gmail">' }
    ];

    // Load shortcuts or initialize defaults if first time
    function getSavedShortcuts() {
      const saved = localStorage.getItem('persistentShortcuts');
      if (saved) return JSON.parse(saved);
      
      // If it's the very first load, set defaults and return them
      localStorage.setItem('persistentShortcuts', JSON.stringify(defaultShortcuts));
      return defaultShortcuts;
    }

    function renderShortcuts() {
      const container = $('#shortcuts');
      const addBtn = $('#addShortcut');
      
      // Clear existing shortcuts except the Add button
      document.querySelectorAll('.shortcut-item').forEach(el => el.remove());

      const shortcuts = getSavedShortcuts();

      shortcuts.forEach(s => {
        const div = document.createElement('div');
        div.className = 'shortcut shortcut-item';
        div.dataset.url = s.url;
        div.innerHTML = `
          <button class="delete-shortcut" onclick="deleteShortcut(event, '${s.url.replace(/'/g, "\\'")}')">
            <i class="fa-solid fa-trash"></i>
          </button>
          <div class="shortcut-icon">${s.iconHtml || '<i class="fa-solid fa-link"></i>'}</div>
          <span class="shortcut-label">${s.name}</span>
        `;
        container.insertBefore(div, addBtn);
      });
    }

    async function deleteShortcut(event, url) {
      event.stopPropagation();
      event.preventDefault();
      
      const isConfirmed = await customConfirm('Are you sure you want to delete this shortcut?');
      if (isConfirmed) {
        let shortcuts = getSavedShortcuts();
        shortcuts = shortcuts.filter(s => s.url !== url);
        localStorage.setItem('persistentShortcuts', JSON.stringify(shortcuts));
        
        // Optional: Animation out before rendering
        const shortcutElement = event.target.closest('.shortcut');
        if (shortcutElement) {
          shortcutElement.style.opacity = '0';
          shortcutElement.style.transform = 'scale(0.8)';
          setTimeout(() => renderShortcuts(), 300);
        } else {
          renderShortcuts();
        }
      }
    }

    // Expose delete to global scope for the inline onclick handler
    window.deleteShortcut = deleteShortcut;

    $('#shortcuts').onclick = async e => {
      const shortcut = e.target.closest('.shortcut-item');
      const addBtn = e.target.closest('#addShortcut');
      const deleteBtn = e.target.closest('.delete-shortcut');

      if (deleteBtn) return; // Handled by inline onclick

      if (shortcut) {
        e.preventDefault();
        nav(shortcut.dataset.url);
      } else if (addBtn) {
        const name = await customPrompt("Enter shortcut name:", "e.g., Cool Site");
        if (!name) return;
        
        let url = await customPrompt("Enter URL:", "e.g., example.com");
        if (!url) return;
        if (!url.startsWith('http')) url = 'https://' + url;

        const shortcuts = getSavedShortcuts();
        shortcuts.push({ name, url, iconHtml: '<i class="fa-solid fa-link"></i>' });
        localStorage.setItem('persistentShortcuts', JSON.stringify(shortcuts));
        renderShortcuts();
      }
    };

    // --- Initial Render ---
    renderShortcuts();

    // --- Quote ---
    const quotes = [
      "so tuff", "it is what it is", "do ur work", 
      "this is what happens when u dont touch grass", 
      "FULL BOX", "FULL PIECE", "200!", 
      "press esc + refresh + power button for hacks", 
      "press ctrl+x to hide your screen", 
      "change the tab title and favicon in settings", 
      "TEACHERR!", "lebron lebron lebronn james", 
      "lebron is OUR goat"
    ];
    $('#quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];
  </script>
</body>

</html>
